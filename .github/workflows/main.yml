name: Rustral Backend CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTEST_CURRENT_TEST: ""

jobs:

  
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8 pylint black isort

      - name: Run Black (Code Formatting)
        run: black --check app/ tests/ --line-length=100 --exclude="(__pycache__|\.venv|\.git|build|dist)"
        continue-on-error: true

      - name: Run isort (Import Sorting)
        run: isort --check-only app/ tests/ --profile black
        continue-on-error: true

      - name: Run Flake8 (Linting)
        run: |
          flake8 app/ tests/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --max-line-length=100 \
            --exclude=__pycache__,\.venv,migrations
        continue-on-error: true

      - name: Run Pylint
        run: pylint app/ --fail-under=7.0 --disable=C0111,C0103,W0212
        continue-on-error: true


  # Unit Tests & Coverage

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27018:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout coverage

      - name: Set up test environment
        run: |
          mkdir -p tests/fixtures
          mkdir -p outputs

      - name:  Wait for MongoDB to be ready
        run: |
          timeout 60 bash -c 'until mongosh --quiet --eval "db.adminCommand({ ping: 1 })" mongodb://localhost:27018 > /dev/null 2>&1; do sleep 1; done'

      - name: 🧪 Run unit tests with pytest
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=term-color \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=75 \
            --maxfail=5 \
            --tb=short \
            -n auto \
            --timeout=300

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50

  # Integration Tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27018:27017

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Wait for MongoDB to be ready
        run: |
          timeout 60 bash -c 'until mongosh --quiet --eval "db.adminCommand({ ping: 1 })" mongodb://localhost:27018 > /dev/null 2>&1; do sleep 1; done'

      - name: Run integration tests
        run: |
          pytest tests/test_endpoints.py \
            -v \
            --tb=short \
            --timeout=300

      - name: Archive integration test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: |
            .pytest_cache/
            test-results/
          retention-days: 7


  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name:  Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name:  Run Bandit (Security linter)
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll
        continue-on-error: true

      - name: Check dependencies with Safety
        run: |
          safety check --json > safety-report.json || true
          safety check
        continue-on-error: true

      - name:  Run pip-audit
        run: |
          pip-audit --desc > pip-audit-report.txt || true
        continue-on-error: true

      - name:  Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.txt
          retention-days: 30

      - name:  Comment PR with security results
        if: github.event_name == 'pull_request'
        run: |
          echo "##  Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "pip-audit-report.txt" ]; then
            echo "### Pip Audit" >> $GITHUB_STEP_SUMMARY
            head -20 pip-audit-report.txt >> $GITHUB_STEP_SUMMARY
          fi


  final-status:
    name:  Final Status Check
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, security-scan]
    if: always()

    steps:
      - name:  Check job statuses
        run: |
          echo "## CI/CD Pipeline Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name:  Verify all tests passed
        run: |
          if [ "${{ needs.code-quality.result }}" != "success" ] && [ "${{ needs.code-quality.result }}" != "skipped" ]; then
            echo " Code Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo " Unit Tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo " Integration Tests failed"
            exit 1
          fi
          echo " All tests passed successfully!"

      - name:  Notify on failure
        if: failure()
        run: |
          echo " CI/CD Pipeline Failed"
          echo "Please check the logs above for details."
          exit 1

      - name: Success notification
        if: success()
        run: |
          echo " CI/CD Pipeline Completed Successfully!"
          echo "All tests passed and code quality checks are complete."
