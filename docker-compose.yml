services:
  mongorust:
    image: mongo:7.0
    container_name: mongorust
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB}
    volumes:
      - mongorust_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet \"mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@localhost:27017/admin?authSource=admin\" --eval \"db.adminCommand({ ping: 1 })\" >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rsutnet

  rustral-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustral-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@mongorust:27017/${MONGODB_DB}?authSource=admin
      PYTEST_CURRENT_TEST: ""
      PORT: 5000
      HOST: 0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      mongorust:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rsutnet

volumes:
  mongorust_data:

networks:
  rsutnet:
    driver: bridge
